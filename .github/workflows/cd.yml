name: cd

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1"
  workflow_run:
    workflows:
      - ci
    types:
      - completed

jobs:
  deploy-and-functional-test:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start container
        run: docker compose up -d --build

      - name: Wait for service
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8000/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs
          exit 1

      - name: Run functional scenario
        run: |
          docker compose exec -T bbc-news-api \
            python scripts/run_scenario.py --scenario scenario.json --base-url http://127.0.0.1:8000

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Stop container
        if: always()
        run: docker compose down
